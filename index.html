<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empieza hoy | Numart</title>
    <link rel="icon" type="image/png" href="https://imagenes.numart.com.co/faviconTemporal.ico">

</head>
<body>
   <div id="loader-wrapper">
    <iframe 
        src="https://loader.mrluki4656.workers.dev/" 
        id="loader-frame"
        style="width:200px; height:200px; border:none; background:transparent;"
        scrolling="no">
    </iframe>
</div>

<style>
    #loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f8f9fa; /* Color de fondo igual al del canvas */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s ease; /* Duración del desvanecimiento */
    }

    /* Clase que aplicaremos para desvanecer */
    .fade-out {
        opacity: 0;
        pointer-events: none;
    }
</style>
</body>
</html>
